<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素地图编辑器</title>
<style>
  :root {
    --bg: #1a1a2e;
    --text: #e0e0e0;
    --accent: #e94560;
    --btn-bg: #0f3460;
    --btn-active: #e94560;
    --canvas-bg: #2a2a3e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 24px;
    letter-spacing: 4px;
    margin-bottom: 16px;
    image-rendering: pixelated;
    text-transform: uppercase;
  }
  #toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  #toolbar button {
    background: var(--btn-bg);
    color: var(--text);
    border: 2px solid #4a4a6e;
    padding: 8px 16px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    image-rendering: pixelated;
    transition: background 0.1s;
  }
  #toolbar button:hover { border-color: var(--accent); }
  #toolbar button.active {
    background: var(--btn-active);
    border-color: var(--btn-active);
  }
  #status {
    font-size: 13px;
    margin-bottom: 10px;
    color: #aaa;
    min-height: 20px;
  }
  canvas {
    border: 2px solid #4a4a6e;
    image-rendering: pixelated;
    cursor: crosshair;
    background: var(--canvas-bg);
    box-shadow: 0 0 20px rgba(233, 69, 96, 0.15);
  }
  #toolbar button:active {
    transform: translateY(1px);
  }
</style>
</head>
<body>
  <h1>Map Editor</h1>
  <div id="toolbar">
    <button id="btn-wall" class="active" data-mode="wall">🖼 画墙 [1]</button>
    <button id="btn-erase" data-mode="erase">🗑 擦除 [2]</button>
    <button id="btn-hero" data-mode="place_hero">🧍 放角色 [3]</button>
    <button id="btn-ball" data-mode="place_ball">🟡 放球 [5]</button>
    <button id="btn-crate" data-mode="place_crate">📦 放箱子 [6]</button>
    <button id="btn-play" data-mode="play">▶ 操控 [4]</button>
    <button id="btn-clear">🗺 清空</button>
    <button id="btn-export">💾 导出</button>
  </div>
  <div id="status">模式: 画墙 — 点击/拖拽画布放置墙体</div>
  <canvas id="map" width="512" height="512"></canvas>

  <script>
    // === 常量 ===
    const CANVAS_SIZE = 512;
    const GRID_SIZE = 16;
    const TILE_SIZE = CANVAS_SIZE / GRID_SIZE; // 32px

    // 地块类型
    const T_EMPTY = 0;
    const T_WALL  = 1;

    // === 箱子注册表（扩展新箱子只需在这里加一项） ===
    const CRATES = {
      wood: { id: 2, name: '木箱', emoji: '📦', pushable: true },
      // 未来变种示例:
      // iron:  { id: 3, name: '铁箱', emoji: '🔩', pushable: false },
      // bomb:  { id: 4, name: '炸弹', emoji: '💣', pushable: true },
    };

    // 工具函数
    function isSolid(v)  { return v !== T_EMPTY; }
    function isCrate(v)  { return v >= 2; }
    function crateById(id) {
      for (const key of Object.keys(CRATES)) {
        if (CRATES[key].id === id) return CRATES[key];
      }
      return null;
    }

    // 尝试推箱子：优先全方向推，被挡降级单轴推同一箱子。返回是否成功
    function tryPushCrate(crateType, cr, cc, pushDr, pushDc) {
      const pr = cr + pushDr;
      const pc = cc + pushDc;
      // 全方向
      if (pr >= 0 && pr < GRID_SIZE && pc >= 0 && pc < GRID_SIZE &&
          grid[pr][pc] === T_EMPTY && !(hero.row === pr && hero.col === pc)) {
        grid[cr][cc] = T_EMPTY;
        grid[pr][pc] = crateType;
        return true;
      }
      // 对角被挡 → 降级单轴推同一箱子
      if (pushDr !== 0 && pushDc !== 0) {
        const prY = cr + pushDr;
        const pcX = cc + pushDc;
        if (prY >= 0 && prY < GRID_SIZE && grid[prY][cc] === T_EMPTY &&
            !(hero.row === prY && hero.col === cc)) {
          grid[cr][cc] = T_EMPTY;
          grid[prY][cc] = crateType;
          return true;
        }
        if (pcX >= 0 && pcX < GRID_SIZE && grid[cr][pcX] === T_EMPTY &&
            !(hero.row === cr && hero.col === pcX)) {
          grid[cr][cc] = T_EMPTY;
          grid[cr][pcX] = crateType;
          return true;
        }
      }
      return false;
    }

    // === DOM 引用 ===
    const canvas = document.getElementById('map');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const btnWall = document.getElementById('btn-wall');
    const btnErase = document.getElementById('btn-erase');
    const btnHero = document.getElementById('btn-hero');
    const btnBall = document.getElementById('btn-ball');
    const btnCrate = document.getElementById('btn-crate');
    const btnPlay = document.getElementById('btn-play');
    const btnExport = document.getElementById('btn-export');
    const btnClear = document.getElementById('btn-clear');
    const allBtns = [btnWall, btnErase, btnHero, btnBall, btnCrate, btnPlay];

    // === 状态 ===
    let mode = 'wall';          // 'wall' | 'erase' | 'place_hero' | 'place_ball' | 'play'
    let grid = [];              // grid[row][col]: 0=空地, 1=墙体, >=2=箱子(见CRATES)
    let hero = null;            // {row, col} | null
    let ball = null;            // {row, col} | null
    let isDrawing = false;      // 鼠标拖拽中
    let hoverCell = null;       // {row, col} | null  鼠标悬停格子

    // === 状态初始化 ===
    function initGrid() {
      grid = [];
      for (let r = 0; r < GRID_SIZE; r++) {
        grid[r] = new Array(GRID_SIZE).fill(T_EMPTY);
      }
    }
    initGrid();

    // === 事件处理 ===
    function getCellFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = CANVAS_SIZE / rect.width;
      const scaleY = CANVAS_SIZE / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;
      const col = Math.floor(mx / TILE_SIZE);
      const row = Math.floor(my / TILE_SIZE);
      if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return null;
      return { row, col };
    }

    function setTile(row, col, value) {
      if (value === T_WALL) {
        if (hero && hero.row === row && hero.col === col) {
          hero = null;
          statusEl.textContent = '⚠ 角色被墙体覆盖，已移除角色';
        }
        if (ball && ball.row === row && ball.col === col) {
          ball = null;
          statusEl.textContent = '⚠ 球被墙体覆盖，已移除球';
        }
      }
      if (grid[row][col] === value) return;
      grid[row][col] = value;
      render();
    }

    function handleCanvasDown(e) {
      if (mode === 'play') return;
      isDrawing = true;
      const cell = getCellFromEvent(e);
      if (!cell) return;

      const placeActions = {
        wall:        () => setTile(cell.row, cell.col, T_WALL),
        erase:       () => setTile(cell.row, cell.col, T_EMPTY),
        place_hero:  () => placeHero(cell.row, cell.col),
        place_ball:  () => placeBall(cell.row, cell.col),
        place_crate: () => placeCrate(cell.row, cell.col),
      };
      if (placeActions[mode]) placeActions[mode]();
    }

    function handleCanvasMove(e) {
      const cell = getCellFromEvent(e);
      hoverCell = cell;

      if (mode === 'place_hero' || mode === 'place_ball' || mode === 'place_crate') {
        render();
        return;
      }

      if (!isDrawing) return;
      if (!cell) return;

      const dragActions = {
        wall:  () => setTile(cell.row, cell.col, T_WALL),
        erase: () => setTile(cell.row, cell.col, T_EMPTY),
      };
      if (dragActions[mode]) dragActions[mode]();
    }

    function handleCanvasUp() {
      isDrawing = false;
    }

    canvas.addEventListener('mousedown', handleCanvasDown);
    canvas.addEventListener('mousemove', handleCanvasMove);
    canvas.addEventListener('mouseup', handleCanvasUp);
    canvas.addEventListener('mouseleave', () => {
      handleCanvasUp();
      hoverCell = null;
      render();
    });

    // === 模式切换 ===
    function setMode(newMode) {
      isDrawing = false;
      mode = newMode;
      allBtns.forEach(b => b.classList.remove('active'));

      const modeLabels = {
        'wall':        '模式: 画墙 — 点击/拖拽画布放置墙体',
        'erase':       '模式: 擦除 — 点击/拖拽画布清除墙体或箱子',
        'place_hero':  '模式: 放置角色 — 点击空地放置角色',
        'place_ball':  '模式: 放置球 — 点击空地放置球（不能和角色/箱子同格）',
        'place_crate': '模式: 放置箱子 — 点击空地放置箱子',
        'play':        '模式: 操控 — 方向键/WASD 移动角色'
      };
      const activeBtns = {
        'wall': btnWall, 'erase': btnErase,
        'place_hero': btnHero, 'place_ball': btnBall, 'place_crate': btnCrate, 'play': btnPlay
      };

      activeBtns[newMode].classList.add('active');
      statusEl.textContent = modeLabels[newMode];
      render();
    }

    document.querySelectorAll('#toolbar button[data-mode]').forEach(b =>
      b.addEventListener('click', () => setMode(b.dataset.mode)));

    // === 导出 ===
    function exportMap() {
      const data = {
        width: GRID_SIZE,
        height: GRID_SIZE,
        tiles: grid.map(row => [...row]),
        heroStart: hero ? { row: hero.row, col: hero.col } : null,
        ballStart: ball ? { row: ball.row, col: ball.col } : null
      };

      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'map.json';
      a.click();
      URL.revokeObjectURL(url);
      statusEl.textContent = '💾 地图已导出为 map.json';
    }

    btnExport.addEventListener('click', exportMap);

    // === 清空地图 ===
    function clearMap() {
      if (!confirm('确定要清空整个地图吗？此操作不可撤销。')) return;
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          grid[r][c] = T_EMPTY;
        }
      }
      hero = null;
      ball = null;
      statusEl.textContent = '🗺 地图已清空';
      render();
    }

    btnClear.addEventListener('click', clearMap);

    // 绳子跟随：主角移动后球尝试跟上，返回false则主角需撤销移动
    function followBall(prevRow, prevCol) {
      if (!ball) return true;
      const dist = Math.max(Math.abs(hero.row - ball.row), Math.abs(hero.col - ball.col));
      if (dist <= 1) return true;

      // 快照grid：diagOk检查中tryPushCrate可能移动箱子，失败时需整体回滚
      const savedGrid = grid.map(r => [...r]);
      const prevBall = { row: ball.row, col: ball.col };
      const dr = Math.sign(prevRow - ball.row);
      const dc = Math.sign(prevCol - ball.col);
      const candidates = [];
      const diagRow = ball.row + dr;
      const diagCol = ball.col + dc;

      let diagOk = dr === 0 || dc === 0;
      if (!diagOk) {
        const c1r = diagRow, c1c = ball.col;
        const c2r = ball.row, c2c = diagCol;
        const c1clear = grid[c1r] && (grid[c1r][c1c] === T_EMPTY ||
          (isCrate(grid[c1r][c1c]) && tryPushCrate(grid[c1r][c1c], c1r, c1c, dr, dc)));
        const c2clear = grid[c2r] && (grid[c2r][c2c] === T_EMPTY ||
          (isCrate(grid[c2r][c2c]) && tryPushCrate(grid[c2r][c2c], c2r, c2c, 0, dc)));
        diagOk = c1clear && c2clear;
      }
      if (diagOk) candidates.push({ row: diagRow, col: diagCol, pushDr: dr, pushDc: dc });
      if (dr !== 0 && dc !== 0) {
        candidates.push({ row: diagRow, col: ball.col, pushDr: dr, pushDc: 0 });
        candidates.push({ row: ball.row, col: diagCol, pushDr: 0,  pushDc: dc });
      }

      let ballMoved = false;
      for (const c of candidates) {
        if (c.row < 0 || c.row >= GRID_SIZE || c.col < 0 || c.col >= GRID_SIZE) continue;
        const d = Math.max(Math.abs(hero.row - c.row), Math.abs(hero.col - c.col));
        if (d > 1) continue;
        const cell = grid[c.row][c.col];
        if (!isCrate(cell)) continue;
        if (tryPushCrate(cell, c.row, c.col, c.pushDr, c.pushDc)) {
          ball = { row: c.row, col: c.col };
          ballMoved = true;
          break;
        }
      }
      if (!ballMoved) {
        for (const c of candidates) {
          if (c.row < 0 || c.row >= GRID_SIZE || c.col < 0 || c.col >= GRID_SIZE) continue;
          if (grid[c.row][c.col] !== T_EMPTY) continue;
          const d = Math.max(Math.abs(hero.row - c.row), Math.abs(hero.col - c.col));
          if (d > 1) continue;
          ball = c;
          ballMoved = true;
          break;
        }
      }

      const finalDist = Math.max(Math.abs(hero.row - ball.row), Math.abs(hero.col - ball.col));
      if (finalDist > 1) {
        ball = prevBall;
        grid = savedGrid;  // 回滚followBall内所有箱子移动
        return false;
      }
      return true;
    }

    // 键盘映射
    const KEY_DIR = {
      'ArrowUp':{dr:-1,dc:0},'w':{dr:-1,dc:0},'W':{dr:-1,dc:0},
      'ArrowDown':{dr:1,dc:0},'s':{dr:1,dc:0},'S':{dr:1,dc:0},
      'ArrowLeft':{dr:0,dc:-1},'a':{dr:0,dc:-1},'A':{dr:0,dc:-1},
      'ArrowRight':{dr:0,dc:1},'d':{dr:0,dc:1},'D':{dr:0,dc:1},
    };
    const KEY_MODE = { '1':'wall','2':'erase','3':'place_hero','4':'play','5':'place_ball','6':'place_crate' };

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (KEY_MODE[e.key]) { setMode(KEY_MODE[e.key]); return; }

      if (mode === 'play' && hero) {
        let { row, col } = hero;
        const dir = KEY_DIR[e.key];
        if (dir) {
          e.preventDefault();
          const nr = row + dir.dr;
          const nc = col + dir.dc;
          // 边界检查
          if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) return;
          // 墙体检查
          if (grid[nr][nc] === T_WALL) return;

          // 推箱子
          if (isCrate(grid[nr][nc])) {
            const crateType = grid[nr][nc];
            const cr = nr + dir.dr;
            const cc = nc + dir.dc;
            if (cr < 0 || cr >= GRID_SIZE || cc < 0 || cc >= GRID_SIZE) return;
            if (isSolid(grid[cr][cc])) return;
            if (ball && ball.row === cr && ball.col === cc) return;
            grid[nr][nc] = T_EMPTY;
            grid[cr][cc] = crateType;
            hero = { row: nr, col: nc };
            // 推完箱子也要绳子跟随
            if (!followBall(row, col)) {
              grid[cr][cc] = T_EMPTY;
              grid[nr][nc] = crateType;
              hero = { row, col };
              return;
            }
          // 推球
          } else if (ball && ball.row === nr && ball.col === nc) {
            const br = nr + dir.dr;
            const bc = nc + dir.dc;
            if (br < 0 || br >= GRID_SIZE || bc < 0 || bc >= GRID_SIZE) return;
            if (isSolid(grid[br][bc])) return;
            ball = { row: br, col: bc };
            hero = { row: nr, col: nc };
          // 普通移动 + 绳子跟随
          } else {
            hero = { row: nr, col: nc };
            if (!followBall(row, col)) {
              hero = { row, col };
              return;
            }
          }

          statusEl.textContent = `角色位置: (${hero.row}, ${hero.col})` +
            (ball ? `  球位置: (${ball.row}, ${ball.col})` : '') +
            (ball ? `  距离: ${Math.max(Math.abs(hero.row - ball.row), Math.abs(hero.col - ball.col))}` : '');
          render();
        }
      }
    });

    // === 角色 ===
    function drawHero(row, col) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      const s = TILE_SIZE / 8;

      // 头发
      ctx.fillStyle = '#4a3728';
      ctx.fillRect(x + s * 3, y + s * 0, s * 2, s * 2);
      // 脸
      ctx.fillStyle = '#f4c89a';
      ctx.fillRect(x + s * 3, y + s * 2, s * 2, s * 2);
      // 眼睛
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x + s * 3, y + s * 2, s, s);
      ctx.fillRect(x + s * 5, y + s * 2, s, s);
      // 身体
      ctx.fillStyle = '#4488cc';
      ctx.fillRect(x + s * 2, y + s * 4, s * 4, s * 2);
      // 手臂
      ctx.fillStyle = '#f4c89a';
      ctx.fillRect(x + s * 1, y + s * 4, s, s * 2);
      ctx.fillRect(x + s * 6, y + s * 4, s, s * 2);
      // 腿
      ctx.fillStyle = '#335577';
      ctx.fillRect(x + s * 2, y + s * 6, s * 2, s * 2);
      ctx.fillRect(x + s * 4, y + s * 6, s * 2, s * 2);
    }

    function placeHero(row, col) {
      if (isSolid(grid[row][col])) {
        statusEl.textContent = '⚠ 不能把角色放在墙体或箱子上！';
        return;
      }
      if (ball && ball.row === row && ball.col === col) {
        statusEl.textContent = '⚠ 不能把角色放在球上！';
        return;
      }
      hero = { row, col };
      // 如果球还没放，自动切换到放球模式
      if (!ball) {
        setMode('place_ball');
        statusEl.textContent = '✅ 角色已放置！现在请放置球';
      } else {
        setMode('play');
        statusEl.textContent = '✅ 角色已放置！方向键/WASD 移动';
      }
      render();
    }

    // === 球 ===
    function drawBall(row, col) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      const s = TILE_SIZE / 8;

      // 外发光
      const cx = x + TILE_SIZE / 2;
      const cy = y + TILE_SIZE / 2;
      const grad = ctx.createRadialGradient(cx, cy, s * 1, cx, cy, s * 3.5);
      grad.addColorStop(0, 'rgba(255, 255, 100, 0.9)');
      grad.addColorStop(0.5, 'rgba(255, 200, 30, 0.5)');
      grad.addColorStop(1, 'rgba(255, 150, 0, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

      // 球体（亮黄圆）
      ctx.fillStyle = '#ffee44';
      ctx.fillRect(x + s * 1, y + s * 1, s * 6, s * 6);

      // 高光
      ctx.fillStyle = '#ffffaa';
      ctx.fillRect(x + s * 2, y + s * 2, s * 3, s * 2);

      // 像素边框
      ctx.strokeStyle = '#ccaa00';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + s * 1 + 0.5, y + s * 1 + 0.5, s * 6 - 1, s * 6 - 1);
    }

    function placeBall(row, col) {
      if (isSolid(grid[row][col])) {
        statusEl.textContent = '⚠ 不能把球放在墙体或箱子上！';
        return;
      }
      if (hero && hero.row === row && hero.col === col) {
        statusEl.textContent = '⚠ 不能把球放在角色上！';
        return;
      }
      ball = { row, col };
      setMode('play');
      statusEl.textContent = '✅ 球已放置！方向键/WASD 移动角色';
      render();
    }

    // === 箱子 ===
    function drawCrateTile(row, col, _crateId) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      // 木箱底色
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      // 木板横纹
      ctx.fillStyle = '#7A5C10';
      ctx.fillRect(x + 2, y + 4, TILE_SIZE - 4, 2);
      ctx.fillRect(x + 2, y + 12, TILE_SIZE - 4, 2);
      ctx.fillRect(x + 2, y + 20, TILE_SIZE - 4, 2);
      ctx.fillRect(x + 2, y + 28, TILE_SIZE - 4, 2);
      // 十字绑带
      ctx.strokeStyle = '#A0792B';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + 3, y + TILE_SIZE / 2);
      ctx.lineTo(x + TILE_SIZE - 3, y + TILE_SIZE / 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + TILE_SIZE / 2, y + 3);
      ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE - 3);
      ctx.stroke();
      // 铁钉（四角）
      ctx.fillStyle = '#555555';
      ctx.fillRect(x + 5, y + 5, 3, 3);
      ctx.fillRect(x + TILE_SIZE - 8, y + 5, 3, 3);
      ctx.fillRect(x + 5, y + TILE_SIZE - 8, 3, 3);
      ctx.fillRect(x + TILE_SIZE - 8, y + TILE_SIZE - 8, 3, 3);
      // 边框
      ctx.strokeStyle = '#6B4F12';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
    }

    function placeCrate(row, col, crateKey) {
      if (isSolid(grid[row][col])) {
        statusEl.textContent = '⚠ 此处已被占用！';
        return;
      }
      if (hero && hero.row === row && hero.col === col) {
        statusEl.textContent = '⚠ 角色在此处！';
        return;
      }
      if (ball && ball.row === row && ball.col === col) {
        statusEl.textContent = '⚠ 球在此处！';
        return;
      }
      const type = CRATES[crateKey || 'wood'];
      grid[row][col] = type.id;
      statusEl.textContent = `${type.emoji} ${type.name}已放置`;
      render();
    }

    // === 绳子 ===
    function drawRope() {
      if (!hero || !ball) return;

      const hx = hero.col * TILE_SIZE + TILE_SIZE / 2;
      const hy = hero.row * TILE_SIZE + TILE_SIZE / 2;
      const bx = ball.col * TILE_SIZE + TILE_SIZE / 2;
      const by = ball.row * TILE_SIZE + TILE_SIZE / 2;

      // 绳子底色（深色轮廓）
      ctx.strokeStyle = '#5a4a32';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(bx, by);
      ctx.stroke();

      // 绳子主线（麻绳色）
      ctx.strokeStyle = '#c4a44a';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(bx, by);
      ctx.stroke();

      // 绳子上像素点（模拟麻绳纹理）
      const dx = bx - hx;
      const dy = by - hy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.floor(dist / 4);
      if (steps > 0) {
        for (let i = 1; i < steps; i++) {
          const t = i / steps;
          const px = hx + dx * t;
          const py = hy + dy * t;
          ctx.fillStyle = (i % 2 === 0) ? '#b8943a' : '#d4b45a';
          ctx.fillRect(px - 1, py - 1, 2, 2);
        }
      }
    }

    // === 渲染 ===
    function drawEmptyTile(row, col) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      ctx.fillStyle = '#3a3a4e';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
    }

    function drawWallTile(row, col) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      ctx.fillStyle = '#555566';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      ctx.strokeStyle = '#777788';
      ctx.lineWidth = 1;
      const third = TILE_SIZE / 3;
      ctx.beginPath();
      ctx.moveTo(x, y + third);
      ctx.lineTo(x + TILE_SIZE, y + third);
      ctx.moveTo(x, y + third * 2);
      ctx.lineTo(x + TILE_SIZE, y + third * 2);
      ctx.moveTo(x + TILE_SIZE / 2, y);
      ctx.lineTo(x + TILE_SIZE / 2, y + third);
      ctx.moveTo(x, y + third);
      ctx.lineTo(x, y + third * 2);
      ctx.moveTo(x + TILE_SIZE / 2, y + third * 2);
      ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE);
      ctx.stroke();
      ctx.strokeStyle = '#444455';
      ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath();
      ctx.moveTo(x, y + TILE_SIZE);
      ctx.lineTo(x, y);
      ctx.lineTo(x + TILE_SIZE, y);
      ctx.stroke();
    }

    function drawGridLines() {
      ctx.strokeStyle = '#4a4a5e';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= GRID_SIZE; i++) {
        const pos = i * TILE_SIZE;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, CANVAS_SIZE);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(CANVAS_SIZE, pos);
        ctx.stroke();
      }
    }

    function render() {
      ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      // 1. 绘制所有格子
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] === T_WALL) {
            drawWallTile(r, c);
          } else if (isCrate(grid[r][c])) {
            drawCrateTile(r, c, grid[r][c]);
          } else {
            drawEmptyTile(r, c);
          }
        }
      }

      // 2. 网格线
      drawGridLines();

      // 3. 悬停高亮
      if ((mode === 'place_hero' || mode === 'place_ball' || mode === 'place_crate') && hoverCell) {
        const { row, col } = hoverCell;
        const x = col * TILE_SIZE;
        const y = row * TILE_SIZE;
        const blocked = isSolid(grid[row][col]) ||
          (mode === 'place_hero' && ball && ball.row === row && ball.col === col) ||
          (mode === 'place_ball' && hero && hero.row === row && hero.col === col);
        if (blocked) {
          ctx.fillStyle = 'rgba(255, 60, 60, 0.4)';
        } else {
          ctx.fillStyle = 'rgba(60, 255, 60, 0.3)';
        }
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      }

      // 4. 绳子（在角色和球下面）
      drawRope();

      // 5. 球（在角色下面，先画）
      if (ball) {
        drawBall(ball.row, ball.col);
      }

      // 6. 角色
      if (hero) {
        drawHero(hero.row, hero.col);
      }
    }

    // 首次渲染
    render();
  </script>
</body>
</html>
