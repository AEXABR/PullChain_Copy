<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>еғҸзҙ ең°еӣҫзј–иҫ‘еҷЁ</title>
<style>
  :root {
    --bg: #1a1a2e;
    --text: #e0e0e0;
    --accent: #e94560;
    --btn-bg: #0f3460;
    --btn-active: #e94560;
    --canvas-bg: #2a2a3e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 24px;
    letter-spacing: 4px;
    margin-bottom: 16px;
    image-rendering: pixelated;
    text-transform: uppercase;
  }
  #toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  #toolbar button {
    background: var(--btn-bg);
    color: var(--text);
    border: 2px solid #4a4a6e;
    padding: 8px 16px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    image-rendering: pixelated;
    transition: background 0.1s;
  }
  #toolbar button:hover { border-color: var(--accent); }
  #toolbar button.active {
    background: var(--btn-active);
    border-color: var(--btn-active);
  }
  #status {
    font-size: 13px;
    margin-bottom: 10px;
    color: #aaa;
    min-height: 20px;
  }
  canvas {
    border: 2px solid #4a4a6e;
    image-rendering: pixelated;
    cursor: crosshair;
    background: var(--canvas-bg);
    box-shadow: 0 0 20px rgba(233, 69, 96, 0.15);
  }
  #toolbar button:active {
    transform: translateY(1px);
  }
</style>
</head>
<body>
  <h1>Map Editor</h1>
  <div id="toolbar">
    <button id="btn-wall" class="active" data-mode="wall">рҹ–ј з”»еўҷ [1]</button>
    <button id="btn-diag" data-mode="diag">в—Ө ж–ңи§’еўҷ [7]</button>
    <button id="btn-erase" data-mode="erase">рҹ—‘ ж“ҰйҷӨ [2]</button>
    <button id="btn-hero" data-mode="place_hero">рҹ§Қ ж”ҫи§’иүІ [3]</button>
    <button id="btn-ball" data-mode="place_ball">рҹҹЎ ж”ҫзҗғ [5]</button>
    <button id="btn-crate" data-mode="place_crate">рҹ“Ұ ж”ҫз®ұеӯҗ [6]</button>
    <button id="btn-play" data-mode="play">в–¶ ж“ҚжҺ§ [4]</button>
    <button id="btn-clear">рҹ—ә жё…з©ә</button>
    <button id="btn-export">рҹ’ҫ еҜјеҮә</button>
  </div>
  <div id="status">жЁЎејҸ: з”»еўҷ вҖ” зӮ№еҮ»/жӢ–жӢҪз”»еёғж”ҫзҪ®еўҷдҪ“</div>
  <canvas id="map" width="512" height="512"></canvas>

  <script>
    // === еёёйҮҸ ===
    const CANVAS_SIZE = 512;
    const GRID_SIZE = 16;
    const TILE_SIZE = CANVAS_SIZE / GRID_SIZE; // 32px

    // ең°еқ—зұ»еһӢ
    const T_EMPTY = 0;
    const T_WALL  = 1;

    // === е®һдҪ“зұ» ===
    class Entity {
      constructor(row, col) { this.row = row; this.col = col; }
    }
    class Hero  extends Entity {}
    class Ball  extends Entity {
      constructor(row, col) { super(row, col); this.lightOn = true; }
      toggle() { this.lightOn = !this.lightOn; }
    }
    class Crate extends Entity {
      constructor(row, col, crateKey) { super(row, col); this.crateKey = crateKey; }
    }

    // === з®ұеӯҗжіЁеҶҢиЎЁпјҲжү©еұ•ж–°з®ұеӯҗеҸӘйңҖеңЁиҝҷйҮҢеҠ дёҖйЎ№пјү ===
    const CRATES = {
      wood: { name: 'жңЁз®ұ', emoji: 'рҹ“Ұ' },
      snow: { name: 'йӣӘеқ—', emoji: 'вқ„пёҸ' },
    };

    // е·Ҙе…·еҮҪж•°
    const K = (r, c) => `${r},${c}`;
    const dist = (r1, c1, r2, c2) => Math.max(Math.abs(r1 - r2), Math.abs(c1 - c2));
    function crateAt(r, c)     { return crates.get(K(r, c)) || null; }
    function entityAt(r, c) {
      if (hero && hero.row === r && hero.col === c) return hero;
      if (ball && ball.row === r && ball.col === c) return ball;
      return crateAt(r, c);
    }
    function isSolid(r, c)     { return grid[r][c] === T_WALL || crateAt(r, c) !== null; }

    // cratesеҝ«з…§пјҲеӣһж»ҡз”Ёпјү
    function snapshotCrates() {
      const snap = new Map();
      for (const [k, v] of crates) snap.set(k, new Crate(v.row, v.col, v.crateKey));
      return snap;
    }
    function restoreCrates(snap) { crates.clear(); for (const [k, v] of snap) crates.set(k, v); }

    // й“ҫејҸжҺЁеҠЁпјҡд»Һ(r,c)жІҝ(dr,dc)жү«жҸҸпјҢиҝ”еӣһеҸҜжҺЁеҠЁзҡ„е®һдҪ“й“ҫгҖӮnull=йҳ»еЎһ
    function getPushChain(r, c, dr, dc) {
      const chain = [];
      while (true) {
        if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return null;
        if (grid[r][c] === T_WALL) return null;
        const ent = entityAt(r, c);
        if (!ent) return chain;
        chain.push(ent);
        r += dr; c += dc;
      }
    }

    // жү§иЎҢй“ҫејҸжҺЁеҠЁпјҡд»ҺеҗҺеҫҖеүҚз§»еҠЁchainдёӯжүҖжңүе®һдҪ“пјҲcrateеҗҢжӯҘжӣҙж–°Map keyпјү
    function pushChain(chain, dr, dc) {
      for (let i = chain.length - 1; i >= 0; i--) {
        const ent = chain[i];
        const newR = ent.row + dr, newC = ent.col + dc;
        if (ent instanceof Crate) {
          crates.delete(K(ent.row, ent.col));
          ent.row = newR; ent.col = newC;
          crates.set(K(newR, newC), ent);
        } else {
          ent.row = newR; ent.col = newC;
        }
      }
    }

    // === DOM еј•з”Ё ===
    const canvas = document.getElementById('map');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const btnWall = document.getElementById('btn-wall');
    const btnDiag = document.getElementById('btn-diag');
    const btnErase = document.getElementById('btn-erase');
    const btnHero = document.getElementById('btn-hero');
    const btnBall = document.getElementById('btn-ball');
    const btnCrate = document.getElementById('btn-crate');
    const btnPlay = document.getElementById('btn-play');
    const btnExport = document.getElementById('btn-export');
    const btnClear = document.getElementById('btn-clear');
    const allBtns = [btnWall, btnDiag, btnErase, btnHero, btnBall, btnCrate, btnPlay];

    // === зҠ¶жҖҒ ===
    let mode = 'wall';          // 'wall' | 'erase' | 'place_hero' | 'place_ball' | 'play'
    let grid = [];              // grid[row][col]: 0=з©әең°, 1=еўҷдҪ“
    let hero = null;             // Hero | null
    let ball = null;             // Ball | null
    const crates = new Map();    // "row,col" -> Crate
    let currentCrateKey = 'wood'; // еҪ“еүҚйҖүдёӯзҡ„з®ұеӯҗзұ»еһӢ
    let currentDiagCorner = 'TL';  // еҪ“еүҚж–ңи§’еўҷзјәеҸЈжңқеҗ‘
    let waterTiles = new Set();  // жңүж°ҙиҙҙеӣҫзҡ„з©әең°еқҗж Ү "row,col"
    const diagCorners = new Map(); // "row,col" вҶ’ 'TL'|'TR'|'BL'|'BR'  ж–ңи§’еўҷзјәеҸЈжңқеҗ‘
    let isDrawing = false;      // йј ж ҮжӢ–жӢҪдёӯ
    let hoverCell = null;       // {row, col} | null  йј ж ҮжӮ¬еҒңж јеӯҗ

    // === зҠ¶жҖҒеҲқе§ӢеҢ– ===
    function initGrid() {
      grid = [];
      for (let r = 0; r < GRID_SIZE; r++) {
        grid[r] = new Array(GRID_SIZE).fill(T_EMPTY);
      }
    }
    initGrid();

    // === дәӢд»¶еӨ„зҗҶ ===
    function getCellFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = CANVAS_SIZE / rect.width;
      const scaleY = CANVAS_SIZE / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;
      const col = Math.floor(mx / TILE_SIZE);
      const row = Math.floor(my / TILE_SIZE);
      if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return null;
      return { row, col };
    }

    function setTile(row, col, value) {
      if (value === T_WALL || value === T_EMPTY) {
        const ent = entityAt(row, col);
        if (ent instanceof Hero) {
          hero = null;
          statusEl.textContent = 'вҡ  и§’иүІиў«иҰҶзӣ–пјҢе·Із§»йҷӨи§’иүІ';
        } else if (ent instanceof Ball) {
          ball = null;
          statusEl.textContent = 'вҡ  зҗғиў«иҰҶзӣ–пјҢе·Із§»йҷӨзҗғ';
        } else if (ent instanceof Crate) {
          crates.delete(K(row, col));
        }
        waterTiles.delete(K(row, col));
        diagCorners.delete(K(row, col));
      }
      if (grid[row][col] === value) return;
      grid[row][col] = value;
      render();
    }

    function handleCanvasDown(e) {
      if (mode === 'play') return;
      isDrawing = true;
      const cell = getCellFromEvent(e);
      if (!cell) return;

      const placeActions = {
        wall:        () => setTile(cell.row, cell.col, T_WALL),
        diag:        () => placeDiagWall(cell.row, cell.col),
        erase:       () => setTile(cell.row, cell.col, T_EMPTY),
        place_hero:  () => placeHero(cell.row, cell.col),
        place_ball:  () => placeBall(cell.row, cell.col),
        place_crate: () => placeCrate(cell.row, cell.col),
      };
      if (placeActions[mode]) placeActions[mode]();
    }

    function handleCanvasMove(e) {
      const cell = getCellFromEvent(e);
      hoverCell = cell;

      if (mode === 'place_hero' || mode === 'place_ball' || mode === 'place_crate') {
        render();
        return;
      }

      if (!isDrawing) return;
      if (!cell) return;

      const dragActions = {
        wall:  () => setTile(cell.row, cell.col, T_WALL),
        diag:  () => placeDiagWall(cell.row, cell.col),
        erase: () => setTile(cell.row, cell.col, T_EMPTY),
      };
      if (dragActions[mode]) dragActions[mode]();
    }

    function handleCanvasUp() {
      isDrawing = false;
    }

    canvas.addEventListener('mousedown', handleCanvasDown);
    canvas.addEventListener('mousemove', handleCanvasMove);
    canvas.addEventListener('mouseup', handleCanvasUp);
    canvas.addEventListener('mouseleave', () => {
      handleCanvasUp();
      hoverCell = null;
      render();
    });

    // === жЁЎејҸеҲҮжҚў ===
    function setMode(newMode) {
      isDrawing = false;
      mode = newMode;
      allBtns.forEach(b => b.classList.remove('active'));

      const modeLabels = {
        'wall':        'жЁЎејҸ: з”»еўҷ вҖ” зӮ№еҮ»/жӢ–жӢҪз”»еёғж”ҫзҪ®еўҷдҪ“',
        'diag':        `жЁЎејҸ: з”»ж–ңи§’еўҷ(${DIAG_SYMBOLS[currentDiagCorner]}зјәеҸЈ) вҖ” зӮ№еҮ»/жӢ–жӢҪз”»еёғж”ҫзҪ®`,
        'erase':       'жЁЎејҸ: ж“ҰйҷӨ вҖ” зӮ№еҮ»/жӢ–жӢҪз”»еёғжё…йҷӨеўҷдҪ“жҲ–з®ұеӯҗ',
        'place_hero':  'жЁЎејҸ: ж”ҫзҪ®и§’иүІ вҖ” зӮ№еҮ»з©әең°ж”ҫзҪ®и§’иүІ',
        'place_ball':  'жЁЎејҸ: ж”ҫзҪ®зҗғ вҖ” зӮ№еҮ»з©әең°ж”ҫзҪ®зҗғпјҲдёҚиғҪе’Ңи§’иүІ/з®ұеӯҗеҗҢж јпјү',
        'place_crate': `жЁЎејҸ: ж”ҫзҪ®${CRATES[currentCrateKey].name} вҖ” зӮ№еҮ»з©әең°ж”ҫзҪ®`,
        'play':        'жЁЎејҸ: ж“ҚжҺ§ вҖ” ж–№еҗ‘й”®/WASD з§»еҠЁи§’иүІ'
      };
      const activeBtns = {
        'wall': btnWall, 'diag': btnDiag, 'erase': btnErase,
        'place_hero': btnHero, 'place_ball': btnBall, 'place_crate': btnCrate, 'play': btnPlay
      };

      activeBtns[newMode].classList.add('active');
      if (newMode === 'place_crate') updateCrateBtn();
      if (newMode === 'diag') updateDiagBtn();
      statusEl.textContent = modeLabels[newMode];
      render();
    }

    const DIAG_CORNERS = ['TL', 'TR', 'BL', 'BR'];
    const DIAG_SYMBOLS = { TL: 'в—Ө', TR: 'в—Ҙ', BL: 'в—Ј', BR: 'в—ў' };

    function updateCrateBtn() {
      const type = CRATES[currentCrateKey];
      btnCrate.textContent = `${type.emoji} ${type.name} [6]`;
    }

    function updateDiagBtn() {
      btnDiag.textContent = `${DIAG_SYMBOLS[currentDiagCorner]} ж–ңи§’еўҷ [7]`;
    }

    document.querySelectorAll('#toolbar button[data-mode]').forEach(b =>
      b.addEventListener('click', () => {
        if (b.dataset.mode === 'place_crate' && mode === 'place_crate') {
          // е·ІеңЁз®ұеӯҗжЁЎејҸеҲҷеҫӘзҺҜеҲҮжҚўз®ұеӯҗзұ»еһӢ
          const keys = Object.keys(CRATES);
          const idx = keys.indexOf(currentCrateKey);
          currentCrateKey = keys[(idx + 1) % keys.length];
          updateCrateBtn();
          statusEl.textContent = `жЁЎејҸ: ж”ҫзҪ®${CRATES[currentCrateKey].name} вҖ” зӮ№еҮ»з©әең°ж”ҫзҪ®`;
          return;
        }
        if (b.dataset.mode === 'diag' && mode === 'diag') {
          // е·ІеңЁж–ңи§’еўҷжЁЎејҸеҲҷеҫӘзҺҜеҲҮжҚўзјәеҸЈжңқеҗ‘
          const idx = DIAG_CORNERS.indexOf(currentDiagCorner);
          currentDiagCorner = DIAG_CORNERS[(idx + 1) % DIAG_CORNERS.length];
          updateDiagBtn();
          statusEl.textContent = `жЁЎејҸ: з”»ж–ңи§’еўҷ(${DIAG_SYMBOLS[currentDiagCorner]}зјәеҸЈ) вҖ” зӮ№еҮ»/жӢ–жӢҪз”»еёғж”ҫзҪ®`;
          return;
        }
        setMode(b.dataset.mode);
      }));

    // === еҜјеҮә ===
    function exportMap() {
      const tiles = grid.map(row => [...row]);
      for (const crate of crates.values()) {
        tiles[crate.row][crate.col] = Object.keys(CRATES).indexOf(crate.crateKey) + 2;
      }
      const diagData = {};
      for (const [k, v] of diagCorners) diagData[k] = v;
      const data = {
        width: GRID_SIZE,
        height: GRID_SIZE,
        tiles: tiles,
        diagCorners: diagData,
        heroStart: hero ? { row: hero.row, col: hero.col } : null,
        ballStart: ball ? { row: ball.row, col: ball.col } : null
      };

      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'map.json';
      a.click();
      URL.revokeObjectURL(url);
      statusEl.textContent = 'рҹ’ҫ ең°еӣҫе·ІеҜјеҮәдёә map.json';
    }

    btnExport.addEventListener('click', exportMap);

    // === жё…з©әең°еӣҫ ===
    function clearMap() {
      if (!confirm('зЎ®е®ҡиҰҒжё…з©әж•ҙдёӘең°еӣҫеҗ—пјҹжӯӨж“ҚдҪңдёҚеҸҜж’Өй”ҖгҖӮ')) return;
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          grid[r][c] = T_EMPTY;
        }
      }
      hero = null;
      ball = null;
      crates.clear();
      currentCrateKey = 'wood';
      waterTiles.clear();
      diagCorners.clear();
      updateCrateBtn();
      statusEl.textContent = 'рҹ—ә ең°еӣҫе·Іжё…з©ә';
      render();
    }

    btnClear.addEventListener('click', clearMap);

    // ж–ңи§’еўҷжӢҗи§’вҶ’зјәеҸЈжҳ е°„пјҡз»ҷе®ҡзҗғеҜ№и§’з§»еҠЁж–№еҗ‘(dr,dc)пјҢиҝ”еӣһдёӨдёӘжӢҗи§’ж јеҗ„йңҖе“ӘдёӘзјәеҸЈ
    function diagCornersFor(dr, dc) {
      if (dr === -1 && dc === -1) return ['BL', 'TR']; // вҶ– c1йңҖBL, c2йңҖTR
      if (dr === -1 && dc ===  1) return ['BR', 'TL']; // вҶ— c1йңҖBR, c2йңҖTL
      if (dr ===  1 && dc === -1) return ['TL', 'BR']; // вҶҷ c1йңҖTL, c2йңҖBR
      if (dr ===  1 && dc ===  1) return ['TR', 'BL']; // вҶҳ c1йңҖTR, c2йңҖBL
      return null;
    }

    // з»іеӯҗи·ҹйҡҸпјҡдё»и§’з§»еҠЁеҗҺзҗғе°қиҜ•и·ҹдёҠпјҢиҝ”еӣһfalseеҲҷдё»и§’йңҖж’Өй”Җз§»еҠЁ
    function followBall(prevRow, prevCol) {
      if (!ball) return true;
      if (dist(hero.row, hero.col, ball.row, ball.col) <= 1) return true;

      const prevBallRow = ball.row, prevBallCol = ball.col;
      const dr = Math.sign(prevRow - ball.row);
      const dc = Math.sign(prevCol - ball.col);
      const candidates = [];
      const diagRow = ball.row + dr;
      const diagCol = ball.col + dc;

      let diagCorner = null; // { c1chain, c2chain } вҖ” жӢҗи§’еҫ…жҺЁй“ҫпјҢе»¶иҝҹеҲ°еҜ№и§’з§»еҠЁжҸҗдәӨж—¶жү§иЎҢ
      let diagOk = dr === 0 || dc === 0;
      if (!diagOk) {
        const c1r = diagRow, c1c = ball.col;
        const c2r = ball.row, c2c = diagCol;
        const c1chain = getPushChain(c1r, c1c, dr, 0);
        const c2chain = getPushChain(c2r, c2c, 0, dc);
        const needed = diagCornersFor(dr, dc);
        const c1clear = grid[c1r] && (!isSolid(c1r, c1c) || c1chain !== null
                                       || (needed && diagCorners.get(K(c1r, c1c)) === needed[0]));
        const c2clear = grid[c2r] && (!isSolid(c2r, c2c) || c2chain !== null
                                       || (needed && diagCorners.get(K(c2r, c2c)) === needed[1]));
        if (c1clear && c2clear) {
          diagOk = true;
          diagCorner = { c1chain, c2chain };
        }
      }
      if (diagOk) candidates.push({ row: diagRow, col: diagCol, pushDr: dr, pushDc: dc, corner: diagCorner });
      if (dr !== 0 && dc !== 0) {
        candidates.push({ row: diagRow, col: ball.col, pushDr: dr, pushDc: 0 });
        candidates.push({ row: ball.row, col: diagCol, pushDr: 0,  pushDc: dc });
      }

      const isValid = (c) =>
        c.row >= 0 && c.row < GRID_SIZE && c.col >= 0 && c.col < GRID_SIZE &&
        dist(hero.row, hero.col, c.row, c.col) <= 1;

      // з¬¬дёҖиҪ®пјҡе°қиҜ•жҺЁз®ұеӯҗз§»еҠЁ
      for (const c of candidates) {
        if (!isValid(c)) continue;
        const chain = getPushChain(c.row, c.col, c.pushDr, c.pushDc);
        // еҜ№и§’з§»еҠЁйңҖжӢҗи§’з®ұеӯҗд№ҹиҰҒжҺЁпјҲжҲ–зӣ®ж Үж јжңүз®ұеӯҗпјүпјӣиҪҙеҜ№йҪҗеҸӘйңҖзӣ®ж Үж јжңүз®ұеӯҗ
        const needsCorner = c.corner && (c.corner.c1chain || c.corner.c2chain);
        const needsPush = chain && chain.length > 0;
        if (!needsCorner && !needsPush) continue; // ж— еҸҜжҺЁд№Ӣзү©пјҢз•ҷз»ҷз¬¬дәҢиҪ®зәҜз§»еҠЁ

        // зӣ®ж Үж јдёҚеҸҜиҫҫпјҲеўҷ/OOBпјүвҶ’ и·іиҝҮ
        if (chain === null) continue;

        // жҸҗдәӨпјҡжӢҗи§’жҺЁ вҶ’ зӣ®ж Үй“ҫжҺЁ вҶ’ з§»еҠЁзҗғ
        if (needsCorner) {
          if (c.corner.c1chain) pushChain(c.corner.c1chain, dr, 0);
          if (c.corner.c2chain) pushChain(c.corner.c2chain, 0, dc);
        }
        if (needsPush) pushChain(chain, c.pushDr, c.pushDc);
        ball.row = c.row; ball.col = c.col;
        break;
      }

      // з¬¬дәҢиҪ®пјҡжҺЁдёҚеҠЁеҲҷе°қиҜ•зәҜз§»еҠЁпјҲдёҚжҺЁз®ұеӯҗпјү
      if (dist(hero.row, hero.col, ball.row, ball.col) > 1) {
        for (const c of candidates) {
          if (!isValid(c)) continue;
          if (!isSolid(c.row, c.col)) {
            ball.row = c.row; ball.col = c.col;
            break;
          }
        }
      }

      // и·қзҰ»е®ҲеҚ«пјҡд»Қз„¶еӨӘиҝңеҲҷжҒўеӨҚзҗғдҪҚзҪ®
      if (dist(hero.row, hero.col, ball.row, ball.col) > 1) {
        ball.row = prevBallRow; ball.col = prevBallCol;
        return false;
      }
      return true;
    }

    // е°қиҜ•з§»еҠЁдё»и§’пјҡеҝ«з…§вҶ’жҺЁз®ұвҶ’з§»еҠЁвҶ’и·ҹйҡҸвҶ’еӨұиҙҘеӣһж»ҡгҖӮиҝ”еӣһ true=жҲҗеҠҹ
    function tryMoveHero(dr, dc) {
      const nr = hero.row + dr, nc = hero.col + dc;

      // иҫ№з•Ң / еўҷжЈҖжҹҘ
      if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) return false;
      if (grid[nr][nc] === T_WALL) return false;

      // й“ҫејҸжҺЁеҠЁжү«жҸҸ
      const chain = getPushChain(nr, nc, dr, dc);
      if (chain === null) return false;

      // еҝ«з…§пјҲеӣһж»ҡз”Ёпјү
      const savedCrates = snapshotCrates();
      const savedHero = { row: hero.row, col: hero.col };
      const savedBall = ball ? { row: ball.row, col: ball.col } : null;

      // жү§иЎҢпјҡжҺЁз®ұеӯҗ + з§»еҠЁдё»и§’
      const prevRow = hero.row, prevCol = hero.col;
      pushChain(chain, dr, dc);
      hero.row = nr; hero.col = nc;

      // з»іеӯҗи·ҹйҡҸ
      if (!followBall(prevRow, prevCol)) {
        restoreCrates(savedCrates);
        if (ball) { ball.row = savedBall.row; ball.col = savedBall.col; }
        hero.row = savedHero.row; hero.col = savedHero.col;
        ball.toggle();
        return false;
      }
      return true;
    }

    // иһҚеҢ–йӣӘеқ—пјҡзҗғејҖзҒҜж—¶пјҢе‘Ёеӣҙ8ж јеҶ…зҡ„йӣӘеқ—иһҚеҢ–дёәж°ҙ
    function meltSnow() {
      if (!ball || !ball.lightOn) return;
      for (const [key, crate] of crates) {
        if (crate.crateKey !== 'snow') continue;
        if (dist(ball.row, ball.col, crate.row, crate.col) <= 1) {
          crates.delete(key);
          waterTiles.add(key);
        }
      }
    }

    // й”®зӣҳжҳ е°„
    const KEY_DIR = {
      'ArrowUp':{dr:-1,dc:0},'w':{dr:-1,dc:0},'W':{dr:-1,dc:0},
      'ArrowDown':{dr:1,dc:0},'s':{dr:1,dc:0},'S':{dr:1,dc:0},
      'ArrowLeft':{dr:0,dc:-1},'a':{dr:0,dc:-1},'A':{dr:0,dc:-1},
      'ArrowRight':{dr:0,dc:1},'d':{dr:0,dc:1},'D':{dr:0,dc:1},
    };
    const KEY_MODE = { '1':'wall','2':'erase','3':'place_hero','4':'play','5':'place_ball','6':'place_crate','7':'diag' };

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (KEY_MODE[e.key]) { setMode(KEY_MODE[e.key]); return; }

      if (mode === 'play' && hero) {
        const dir = KEY_DIR[e.key];
        if (dir) {
          e.preventDefault();
          if (tryMoveHero(dir.dr, dir.dc)) {
            meltSnow();
            statusEl.textContent = `и§’иүІдҪҚзҪ®: (${hero.row}, ${hero.col})` +
              (ball ? `  зҗғдҪҚзҪ®: (${ball.row}, ${ball.col}) [${ball.lightOn ? 'рҹ’ЎејҖ' : 'рҹҢ‘е…і'}]` : '') +
              (ball ? `  и·қзҰ»: ${dist(hero.row, hero.col, ball.row, ball.col)}` : '');
          }
          render();
        }
      }
    });

    // === и§’иүІ ===
    function drawHero(row, col) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      const s = TILE_SIZE / 8;

      // еӨҙеҸ‘
      ctx.fillStyle = '#4a3728';
      ctx.fillRect(x + s * 3, y + s * 0, s * 2, s * 2);
      // и„ё
      ctx.fillStyle = '#f4c89a';
      ctx.fillRect(x + s * 3, y + s * 2, s * 2, s * 2);
      // зңјзқӣ
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x + s * 3, y + s * 2, s, s);
      ctx.fillRect(x + s * 5, y + s * 2, s, s);
      // иә«дҪ“
      ctx.fillStyle = '#4488cc';
      ctx.fillRect(x + s * 2, y + s * 4, s * 4, s * 2);
      // жүӢиҮӮ
      ctx.fillStyle = '#f4c89a';
      ctx.fillRect(x + s * 1, y + s * 4, s, s * 2);
      ctx.fillRect(x + s * 6, y + s * 4, s, s * 2);
      // и…ҝ
      ctx.fillStyle = '#335577';
      ctx.fillRect(x + s * 2, y + s * 6, s * 2, s * 2);
      ctx.fillRect(x + s * 4, y + s * 6, s * 2, s * 2);
    }

    function placeHero(row, col) {
      if (isSolid(row, col)) {
        statusEl.textContent = 'вҡ  дёҚиғҪжҠҠи§’иүІж”ҫеңЁеўҷдҪ“жҲ–з®ұеӯҗдёҠпјҒ';
        return;
      }
      if (ball && ball.row === row && ball.col === col) {
        statusEl.textContent = 'вҡ  дёҚиғҪжҠҠи§’иүІж”ҫеңЁзҗғдёҠпјҒ';
        return;
      }
      hero = new Hero(row, col);
      // еҰӮжһңзҗғиҝҳжІЎж”ҫпјҢиҮӘеҠЁеҲҮжҚўеҲ°ж”ҫзҗғжЁЎејҸ
      if (!ball) {
        setMode('place_ball');
        statusEl.textContent = 'вң… и§’иүІе·Іж”ҫзҪ®пјҒзҺ°еңЁиҜ·ж”ҫзҪ®зҗғ';
      } else {
        setMode('play');
        statusEl.textContent = 'вң… и§’иүІе·Іж”ҫзҪ®пјҒж–№еҗ‘й”®/WASD з§»еҠЁ';
      }
      render();
    }

    // === зҗғ ===
    function drawBall(ball) {
      const x = ball.col * TILE_SIZE;
      const y = ball.row * TILE_SIZE;
      const s = TILE_SIZE / 8;

      if (ball.lightOn) {
        // === ејҖзҒҜеҪўжҖҒпјҡдә®й»„иүІеҸ‘е…үзҗғ ===
        // еӨ–еҸ‘е…ү
        const cx = x + TILE_SIZE / 2;
        const cy = y + TILE_SIZE / 2;
        const grad = ctx.createRadialGradient(cx, cy, s * 1, cx, cy, s * 3.5);
        grad.addColorStop(0, 'rgba(255, 255, 100, 0.9)');
        grad.addColorStop(0.5, 'rgba(255, 200, 30, 0.5)');
        grad.addColorStop(1, 'rgba(255, 150, 0, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

        // зҗғдҪ“пјҲдә®й»„еңҶпјү
        ctx.fillStyle = '#ffee44';
        ctx.fillRect(x + s * 1, y + s * 1, s * 6, s * 6);

        // й«ҳе…ү
        ctx.fillStyle = '#ffffaa';
        ctx.fillRect(x + s * 2, y + s * 2, s * 3, s * 2);

        // еғҸзҙ иҫ№жЎҶ
        ctx.strokeStyle = '#ccaa00';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + s * 1 + 0.5, y + s * 1 + 0.5, s * 6 - 1, s * 6 - 1);
      } else {
        // === е…ізҒҜеҪўжҖҒпјҡзҒ°иүІжҡ—зҗғ ===
        // еҫ®ејұжҡ—е…ү
        const cx = x + TILE_SIZE / 2;
        const cy = y + TILE_SIZE / 2;
        const grad = ctx.createRadialGradient(cx, cy, s * 1, cx, cy, s * 3.5);
        grad.addColorStop(0, 'rgba(100, 100, 100, 0.4)');
        grad.addColorStop(0.5, 'rgba(80, 80, 80, 0.2)');
        grad.addColorStop(1, 'rgba(60, 60, 60, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

        // зҗғдҪ“пјҲзҒ°иүІпјү
        ctx.fillStyle = '#888888';
        ctx.fillRect(x + s * 1, y + s * 1, s * 6, s * 6);

        // жҡ—й«ҳе…ү
        ctx.fillStyle = '#aaaaaa';
        ctx.fillRect(x + s * 2, y + s * 2, s * 3, s * 2);

        // еғҸзҙ иҫ№жЎҶ
        ctx.strokeStyle = '#666666';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + s * 1 + 0.5, y + s * 1 + 0.5, s * 6 - 1, s * 6 - 1);
      }
    }

    function placeBall(row, col) {
      if (isSolid(row, col)) {
        statusEl.textContent = 'вҡ  дёҚиғҪжҠҠзҗғж”ҫеңЁеўҷдҪ“жҲ–з®ұеӯҗдёҠпјҒ';
        return;
      }
      if (hero && hero.row === row && hero.col === col) {
        statusEl.textContent = 'вҡ  дёҚиғҪжҠҠзҗғж”ҫеңЁи§’иүІдёҠпјҒ';
        return;
      }
      ball = new Ball(row, col);
      setMode('play');
      statusEl.textContent = 'вң… зҗғе·Іж”ҫзҪ®пјҒж–№еҗ‘й”®/WASD з§»еҠЁи§’иүІ';
      render();
    }

    // === з®ұеӯҗ ===
    function drawCrateTile(crate) {
      const row = crate.row, col = crate.col;
      if (crate.crateKey === 'snow') {
        drawSnowTile(row, col);
        return;
      }
      // й»ҳи®ӨжңЁз®ұпјҲеҶ…зј©дёҖеңҲпјҢе’Ңи§’иүІ/зҗғдёҖиҮҙпјү
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      const s = TILE_SIZE / 8;
      const x0 = x + s, y0 = y + s, w = s * 6;

      // жңЁз®ұеә•иүІ
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(x0, y0, w, w);
      // жңЁжқҝжЁӘзә№
      ctx.fillStyle = '#7A5C10';
      ctx.fillRect(x0 + 2, y0 + s * 1, w - 4, 2);
      ctx.fillRect(x0 + 2, y0 + s * 2, w - 4, 2);
      ctx.fillRect(x0 + 2, y0 + s * 3, w - 4, 2);
      ctx.fillRect(x0 + 2, y0 + s * 4, w - 4, 2);
      ctx.fillRect(x0 + 2, y0 + s * 5, w - 4, 2);
      // еҚҒеӯ—з»‘еёҰ
      ctx.strokeStyle = '#A0792B';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x0 + 3, y0 + w / 2);
      ctx.lineTo(x0 + w - 3, y0 + w / 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x0 + w / 2, y0 + 3);
      ctx.lineTo(x0 + w / 2, y0 + w - 3);
      ctx.stroke();
      // й“Ғй’үпјҲеӣӣи§’пјү
      ctx.fillStyle = '#555555';
      ctx.fillRect(x0 + 3, y0 + 3, 3, 3);
      ctx.fillRect(x0 + w - 6, y0 + 3, 3, 3);
      ctx.fillRect(x0 + 3, y0 + w - 6, 3, 3);
      ctx.fillRect(x0 + w - 6, y0 + w - 6, 3, 3);
      // иҫ№жЎҶ
      ctx.strokeStyle = '#6B4F12';
      ctx.lineWidth = 1;
      ctx.strokeRect(x0 + 0.5, y0 + 0.5, w - 1, w - 1);
    }

    function drawSnowTile(row, col) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      const s = TILE_SIZE / 8;
      const x0 = x + s, y0 = y + s, w = s * 6;

      // йӣӘзҷҪеә•иүІ
      ctx.fillStyle = '#d8e8f0';
      ctx.fillRect(x0, y0, w, w);
      // еҶ°и“қжҡ—и§’
      ctx.fillStyle = '#b8d4e8';
      ctx.fillRect(x0 + 2, y0 + 2, w - 4, w - 4);
      // еҶ°жҷ¶зә№зҗҶпјҲиҸұеҪўй«ҳе…үпјҢзӣёеҜ№еҶ…зј©еҢәеҹҹпјү
      ctx.fillStyle = '#eef8ff';
      ctx.fillRect(x0 + s * 2, y0 + s * 0, s * 2, s * 2);
      ctx.fillRect(x0 + s * 0, y0 + s * 2, s * 2, s * 2);
      ctx.fillRect(x0 + s * 4, y0 + s * 2, s * 2, s * 2);
      ctx.fillRect(x0 + s * 2, y0 + s * 4, s * 2, s * 2);
      // йӣӘиҠұдёӯеҝғ
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x0 + s * 2, y0 + s * 2, s * 2, s * 2);
      // еҶ°и“қиҫ№жЎҶ
      ctx.strokeStyle = '#8ab8d0';
      ctx.lineWidth = 1;
      ctx.strokeRect(x0 + 0.5, y0 + 0.5, w - 1, w - 1);
    }

    function drawWaterTile(row, col) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      const s = TILE_SIZE / 8;

      // ж°ҙйқўеә•иүІ
      ctx.fillStyle = '#3377aa';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      // ж·ұжө…жіўзә№
      ctx.fillStyle = '#4499cc';
      ctx.fillRect(x + 0, y + s * 1, TILE_SIZE, s);
      ctx.fillRect(x + 0, y + s * 3, TILE_SIZE, s);
      ctx.fillRect(x + 0, y + s * 5, TILE_SIZE, s);
      // й«ҳе…үжіўеі°
      ctx.fillStyle = '#66bbee';
      ctx.fillRect(x + 2, y + s * 2, TILE_SIZE - 4, s);
      ctx.fillRect(x + 2, y + s * 6, TILE_SIZE - 4, s);
      // еғҸзҙ иҫ№жЎҶ
      ctx.strokeStyle = '#2266aa';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
    }

    function placeDiagWall(row, col) {
      if (isSolid(row, col)) {
        // е…Ғи®ёиҰҶзӣ–е·Іжңүзҡ„ж–ңи§’еўҷпјҲжӣҙж”№зјәеҸЈжңқеҗ‘пјүжҲ–жҷ®йҖҡеўҷпјҲеҚҮзә§дёәж–ңи§’еўҷпјү
      }
      setTile(row, col, T_WALL);
      diagCorners.set(K(row, col), currentDiagCorner);
      render(); // setTileеҶ…йғЁrenderж—¶diagCornersиҝҳжңӘи®ҫзҪ®пјҢйңҖиЎҘжёІжҹ“дёҖж¬Ў
      statusEl.textContent = `${DIAG_SYMBOLS[currentDiagCorner]} ж–ңи§’еўҷ(${currentDiagCorner}зјәеҸЈ)е·Іж”ҫзҪ®`;
    }

    function placeCrate(row, col) {
      if (isSolid(row, col)) {
        statusEl.textContent = 'вҡ  жӯӨеӨ„е·Іиў«еҚ з”ЁпјҒ';
        return;
      }
      if (hero && hero.row === row && hero.col === col) {
        statusEl.textContent = 'вҡ  и§’иүІеңЁжӯӨеӨ„пјҒ';
        return;
      }
      if (ball && ball.row === row && ball.col === col) {
        statusEl.textContent = 'вҡ  зҗғеңЁжӯӨеӨ„пјҒ';
        return;
      }
      const type = CRATES[currentCrateKey];
      crates.set(K(row, col), new Crate(row, col, currentCrateKey));
      statusEl.textContent = `${type.emoji} ${type.name}е·Іж”ҫзҪ®`;
      render();
    }

    // === з»іеӯҗ ===
    function drawRope() {
      if (!hero || !ball) return;

      const hx = hero.col * TILE_SIZE + TILE_SIZE / 2;
      const hy = hero.row * TILE_SIZE + TILE_SIZE / 2;
      const bx = ball.col * TILE_SIZE + TILE_SIZE / 2;
      const by = ball.row * TILE_SIZE + TILE_SIZE / 2;

      // з»іеӯҗеә•иүІпјҲж·ұиүІиҪ®е»“пјү
      ctx.strokeStyle = '#5a4a32';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(bx, by);
      ctx.stroke();

      // з»іеӯҗдё»зәҝпјҲйә»з»іиүІпјү
      ctx.strokeStyle = '#c4a44a';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(bx, by);
      ctx.stroke();

      // з»іеӯҗдёҠеғҸзҙ зӮ№пјҲжЁЎжӢҹйә»з»ізә№зҗҶпјү
      const dx = bx - hx;
      const dy = by - hy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.floor(dist / 4);
      if (steps > 0) {
        for (let i = 1; i < steps; i++) {
          const t = i / steps;
          const px = hx + dx * t;
          const py = hy + dy * t;
          ctx.fillStyle = (i % 2 === 0) ? '#b8943a' : '#d4b45a';
          ctx.fillRect(px - 1, py - 1, 2, 2);
        }
      }
    }

    // === жёІжҹ“ ===
    function drawEmptyTile(row, col) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      ctx.fillStyle = '#3a3a4e';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
    }

    function drawWallTile(row, col) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      ctx.fillStyle = '#555566';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      ctx.strokeStyle = '#777788';
      ctx.lineWidth = 1;
      const third = TILE_SIZE / 3;
      ctx.beginPath();
      ctx.moveTo(x, y + third);
      ctx.lineTo(x + TILE_SIZE, y + third);
      ctx.moveTo(x, y + third * 2);
      ctx.lineTo(x + TILE_SIZE, y + third * 2);
      ctx.moveTo(x + TILE_SIZE / 2, y);
      ctx.lineTo(x + TILE_SIZE / 2, y + third);
      ctx.moveTo(x, y + third);
      ctx.lineTo(x, y + third * 2);
      ctx.moveTo(x + TILE_SIZE / 2, y + third * 2);
      ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE);
      ctx.stroke();
      ctx.strokeStyle = '#444455';
      ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath();
      ctx.moveTo(x, y + TILE_SIZE);
      ctx.lineTo(x, y);
      ctx.lineTo(x + TILE_SIZE, y);
      ctx.stroke();
    }

    function drawDiagWallTile(row, col, corner) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      // дёҺжҷ®йҖҡеўҷдёҖиҮҙзҡ„еә•иүІе’Ңз –зә№
      ctx.fillStyle = '#555566';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      ctx.strokeStyle = '#777788';
      ctx.lineWidth = 1;
      const third = TILE_SIZE / 3;
      ctx.beginPath();
      ctx.moveTo(x, y + third);
      ctx.lineTo(x + TILE_SIZE, y + third);
      ctx.moveTo(x, y + third * 2);
      ctx.lineTo(x + TILE_SIZE, y + third * 2);
      ctx.moveTo(x + TILE_SIZE / 2, y);
      ctx.lineTo(x + TILE_SIZE / 2, y + third);
      ctx.moveTo(x, y + third);
      ctx.lineTo(x, y + third * 2);
      ctx.moveTo(x + TILE_SIZE / 2, y + third * 2);
      ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE);
      ctx.stroke();
      ctx.strokeStyle = '#444455';
      ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);

      // зјәеҸЈжҢҮзӨәпјҡеңЁеҜ№еә”и§’з”»дёҖдёӘе°Ҹдёүи§’пјҢйўңиүІе’Ңз©әең°дёҖиҮҙ
      ctx.fillStyle = '#3a3a4e';
      const gap = TILE_SIZE / 4;
      const corners = {
        TL: [[x, y], [x + gap, y], [x, y + gap]],
        TR: [[x + TILE_SIZE, y], [x + TILE_SIZE - gap, y], [x + TILE_SIZE, y + gap]],
        BL: [[x, y + TILE_SIZE], [x + gap, y + TILE_SIZE], [x, y + TILE_SIZE - gap]],
        BR: [[x + TILE_SIZE, y + TILE_SIZE], [x + TILE_SIZE - gap, y + TILE_SIZE], [x + TILE_SIZE, y + TILE_SIZE - gap]],
      };
      const pts = corners[corner];
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      ctx.lineTo(pts[1][0], pts[1][1]);
      ctx.lineTo(pts[2][0], pts[2][1]);
      ctx.fill();

      // й«ҳе…үиҫ№
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath();
      ctx.moveTo(x, y + TILE_SIZE);
      ctx.lineTo(x, y);
      ctx.lineTo(x + TILE_SIZE, y);
      ctx.stroke();
    }

    function drawGridLines() {
      ctx.strokeStyle = '#4a4a5e';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= GRID_SIZE; i++) {
        const pos = i * TILE_SIZE;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, CANVAS_SIZE);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(CANVAS_SIZE, pos);
        ctx.stroke();
      }
    }

    function render() {
      ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      // 1. з»ҳеҲ¶жүҖжңүж јеӯҗпјҲеўҷгҖҒж°ҙгҖҒз©әең°пјү
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] === T_WALL) {
            const corner = diagCorners.get(K(r, c));
            if (corner) {
              drawDiagWallTile(r, c, corner);
            } else {
              drawWallTile(r, c);
            }
          } else if (waterTiles.has(K(r, c))) {
            drawWaterTile(r, c);
          } else {
            drawEmptyTile(r, c);
          }
        }
      }

      // 1.5 з»ҳеҲ¶жүҖжңүз®ұеӯҗпјҲеҸ еңЁж јеӯҗдёҠпјү
      for (const crate of crates.values()) {
        drawCrateTile(crate);
      }

      // 2. зҪ‘ж јзәҝ
      drawGridLines();

      // 3. жӮ¬еҒңй«ҳдә®
      if ((mode === 'place_hero' || mode === 'place_ball' || mode === 'place_crate') && hoverCell) {
        const { row, col } = hoverCell;
        const x = col * TILE_SIZE;
        const y = row * TILE_SIZE;
        const blocked = isSolid(row, col) ||
          (mode === 'place_hero' && ball && ball.row === row && ball.col === col) ||
          (mode === 'place_ball' && hero && hero.row === row && hero.col === col);
        if (blocked) {
          ctx.fillStyle = 'rgba(255, 60, 60, 0.4)';
        } else {
          ctx.fillStyle = 'rgba(60, 255, 60, 0.3)';
        }
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      }

      // 4. з»іеӯҗпјҲеңЁи§’иүІе’ҢзҗғдёӢйқўпјү
      drawRope();

      // 5. зҗғпјҲеңЁи§’иүІдёӢйқўпјҢе…Ҳз”»пјү
      if (ball) drawBall(ball);

      // 6. и§’иүІ
      if (hero) {
        drawHero(hero.row, hero.col);
      }
    }

    // йҰ–ж¬ЎжёІжҹ“
    render();
  </script>
</body>
</html>
